name: PII Leakage Security Audit

# This tells the robot to run every time someone pushes code to the main branch
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the exact tools we used today
          pip install presidio-analyzer presidio-anonymizer spacy sentence-transformers langchain-huggingface
          # Download the English language model
          python -m spacy download en_core_web_lg

      - name: Run Automated PII Leakage Test
        # This runs the exact test script you just successfully ran on your machine!
        run: |
          python test_pii_leakage.py
